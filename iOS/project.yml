name: LooseEnds
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  LooseEnds:
    type: application
    platform: iOS
    sources:
      - path: LooseEnds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.looseends
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: LooseEnds/Info.plist
        CODE_SIGN_ENTITLEMENTS: LooseEnds/LooseEnds.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LooseEndsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LooseEndsTests
      - path: LooseEnds.storekit
    dependencies:
      - target: LooseEnds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.looseends.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  LooseEnds:
    build:
      targets:
        LooseEnds: all
        LooseEndsTests: [test]
    run:
      config: Debug
      storeKitConfiguration: LooseEnds.storekit
    test:
      config: Debug
      storeKitConfiguration: LooseEnds.storekit
      targets:
        - LooseEndsTests
    archive:
      config: Release
